<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Kuraysoft KurayX Uygulamasını İndir</title>
    <meta name="description" content="Kuraysoft KurayX uygulamasını indirerek akıllı merdiven aydınlatma cihazınızı kolayca kontrol edin. Android ve iOS için hızlı erişim.">

    <!-- Open Graph (WhatsApp, iMessage, vs.) -->
    <meta property="og:title" content="KurayX Uygulamasını İndir">
    <meta property="og:description" content="Kuraysoft akıllı merdiven aydınlatma cihazınızı kontrol etmek için uygulamayı indir.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://myasinkrly.github.io/qr-code-redirect/">
    <meta property="og:image" content="https://static.wixstatic.com/media/95cf8c_fae2ba5ef9d84d14a82d931cf3484f34~mv2.png">

    <!-- Twitter (opsiyonel ama iyi olur) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="KurayX Uygulamasını İndir">
    <meta name="twitter:description" content="Kuraysoft akıllı aydınlatma sisteminizi kontrol edin.">
    <meta name="twitter:image" content="https://static.wixstatic.com/media/95cf8c_fae2ba5ef9d84d14a82d931cf3484f34~mv2.png">

    <meta name="author" content="Kuraysoft">
    <meta name="robots" content="noindex, nofollow">

    <title>KurayX Yönlendirme</title>
</head>
<body>
    <script>
        (function() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;

            // Android cihazı tespit etme
            if (/android/i.test(userAgent)) {
                window.location.href = "https://play.google.com/store/apps/details?id=com.myasinkuralay.kurayx"; // Android için Play Store linki
            }
            // iOS cihazı (iPhone, iPad, iPod, Mac) tespit etme
            else if (/iPad|iPhone|iPod|Mac/.test(userAgent) && !window.MSStream) {
                window.location.href = "https://apps.apple.com/tr/app/kurayx/id6752668842"; // iOS için App Store linki
            }
            // Diğer cihazlar için yönlendirme (QR-404 sayfasına yönlendirme)
            else {
                window.location.href = "https://kursoftaydinlatma.com/qr-404"; // QR-404 sayfasına yönlendirme
            }
        })();
    </script>
</body>
</html>
